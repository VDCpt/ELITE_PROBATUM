<!DOCTYPE html>
<html lang="pt-PT" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="ELITE PROBATUM v2.0.5 — Unidade de Comando Estratégico">
    <meta name="author" content="ELITE PROBATUM">
    <title>ELITE PROBATUM | Unidade de Comando Estratégico v2.0.5</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_additions.css">
    
    <style>
        /* Login Wall Overlayer */
        #loginWall {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; z-index: 9999; display: flex;
            align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(15, 23, 42, 0.9);
            padding: 2.5rem; border-radius: 12px;
            border: 1px solid #00e5ff; width: 100%; max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
        }
        .login-card h2 { color: #00e5ff; margin-bottom: 1.5rem; text-align: center; font-family: 'JetBrains Mono', monospace; }
        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; color: #94a3b8; margin-bottom: 0.5rem; font-size: 0.8rem; }
        .input-group input { 
            width: 100%; padding: 0.75rem; background: #1e293b; border: 1px solid #334155;
            color: white; border-radius: 4px; outline: none;
        }
        .input-group input:focus { border-color: #00e5ff; }
        .btn-login {
            width: 100%; padding: 0.8rem; background: #00e5ff; border: none;
            color: #020617; font-weight: bold; cursor: pointer; border-radius: 4px;
            margin-top: 1rem; transition: 0.3s;
        }
        .btn-login:hover { background: #00b8cc; }
        #loginError { color: #ef4444; font-size: 0.85rem; margin-top: 1rem; text-align: center; display: none; }
    </style>
</head>
<body class="probatum-v2">

    <div id="loginWall">
        <div class="login-card">
            <h2>UNIFED PROBATUM</h2>
            <div class="input-group">
                <label>Utilizador</label>
                <input type="text" id="userIn" placeholder="admin">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="passIn" placeholder="••••••••">
            </div>
            <button class="btn-login" onclick="handleLogin()">ENTRAR NO COFRE</button>
            <div id="loginError">Acesso negado. Verifique as credenciais.</div>
        </div>
    </div>

    <div id="appContent" style="display:none;">
        <div id="pureDashboardWrapper">
            </div>
    </div>

    <script src="js_auth.js"></script>
    <script src="js_core_app.js"></script>
    <script src="script.js"></script>
    <script src="script_injection.js"></script>
    <script src="unifed_triada_export.js"></script>
    <script src="nexus.js"></script>
    <script src="enrichment.js"></script>

    <script>
        /**
         * Lógica de Intermediação de Login v2.0.5
         */
        async function handleLogin() {
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;
            const err = document.getElementById('loginError');

            try {
                const result = await window.AuthClient.login(u, p);
                if (result.success) {
                    document.getElementById('loginWall').style.display = 'none';
                    document.getElementById('appContent').style.display = 'block';
                    
                    // Ativa o motor pericial v13.5.0-PURE após entrada
                    if (window._activatePurePanel) {
                        window._activatePurePanel();
                    } else if (window.loadAnonymizedRealCase) {
                        window.loadAnonymizedRealCase();
                    }
                }
            } catch (e) {
                err.style.display = 'block';
                console.error('[SECURITY] Falha na tentativa de intrusão.');
            }
        }

        // Tentar auto-login se houver token válido
        window.addEventListener('DOMContentLoaded', async () => {
            const active = await window.AuthClient.tryAutoLogin();
            if (active) {
                document.getElementById('loginWall').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                setTimeout(() => { if(window._activatePurePanel) window._activatePurePanel(); }, 500);
            }
        });
    </script>
</body>
</html>
