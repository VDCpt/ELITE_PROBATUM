<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE PROBATUM | Unidade de Comando</title>
    
    <style>
        :root { --accent: #00e5ff; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        #loginWall {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .login-box {
            background: #0f172a; padding: 40px; border-radius: 12px;
            border: 1px solid var(--accent); width: 100%; max-width: 350px;
            text-align: center; box-shadow: 0 0 30px rgba(0,229,255,0.1);
        }
        h2 { color: var(--accent); font-family: monospace; margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px;
            border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 14px; background: var(--accent); color: #020617;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        #errMsg { color: #ef4444; font-size: 12px; margin-top: 15px; display: none; }
        #appContent { display: none; padding: 20px; }
    </style>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_additions.css">
</head>
<body>

    <div id="loginWall">
        <div class="login-box">
            <h2>ELITE PROBATUM</h2>
            <input type="text" id="userInput" placeholder="Utilizador (admin)" autocomplete="off">
            <input type="password" id="passInput" placeholder="Palavra-passe">
            <button id="loginBtn">ACEDER À UNIDADE</button>
            <p id="errMsg">Acesso Negado: Credenciais Inválidas.</p>
        </div>
    </div>

    <div id="appContent">
        <div id="pureDashboardWrapper"></div>
    </div>

    <script src="js_auth.js"></script>
    <script src="js_core_app.js"></script>
    <script src="script.js"></script>
    <script src="script_injection.js"></script>
    <script src="unifed_triada_export.js"></script>

    <script>
        const wall = document.getElementById('loginWall');
        const content = document.getElementById('appContent');
        const err = document.getElementById('errMsg');

        async function handleLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            
            try {
                const result = await window.AuthClient.login(u, p);
                if (result.success) {
                    wall.style.display = 'none';
                    content.style.display = 'block';
                    
                    // Inicializa os dados forenses
                    if (window.loadAnonymizedRealCase) window.loadAnonymizedRealCase();
                }
            } catch (e) {
                err.style.display = 'block';
            }
        }

        document.getElementById('loginBtn').addEventListener('click', handleLogin);
        
        // Listener para tecla Enter
        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleLogin(); });

        // Verificação de sessão existente ao carregar
        window.onload = async () => {
            if (window.AuthClient && await window.AuthClient.tryAutoLogin()) {
                wall.style.display = 'none';
                content.style.display = 'block';
                setTimeout(() => { if(window.loadAnonymizedRealCase) window.loadAnonymizedRealCase(); }, 100);
            }
        };
    </script>
</body>
</html>
