<!DOCTYPE html>
<html lang="pt-PT" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ELITE PROBATUM | Unidade de Comando Estratégico v2.0.5</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_additions.css">
    
    <style>
        /* Camada de Segurança Visual (Login Wall) */
        #loginWall {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; z-index: 99999; display: flex;
            align-items: center; justify-content: center; font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: rgba(15, 23, 42, 0.95);
            padding: 2.5rem; border-radius: 12px;
            border: 1px solid #00e5ff; width: 90%; max-width: 400px;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.15);
            text-align: center;
        }
        .login-card h2 { color: #00e5ff; margin-bottom: 0.5rem; font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; }
        .login-card p { color: #64748b; font-size: 0.8rem; margin-bottom: 2rem; }
        .input-group { margin-bottom: 1.2rem; text-align: left; }
        .input-group label { display: block; color: #94a3b8; margin-bottom: 0.4rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-group input { 
            width: 100%; padding: 0.8rem; background: #0f172a; border: 1px solid #334155;
            color: white; border-radius: 6px; outline: none; font-size: 1rem; transition: 0.2s;
        }
        .input-group input:focus { border-color: #00e5ff; box-shadow: 0 0 10px rgba(0, 229, 255, 0.1); }
        .btn-login {
            width: 100%; padding: 1rem; background: #00e5ff; border: none;
            color: #020617; font-weight: 800; cursor: pointer; border-radius: 6px;
            margin-top: 1rem; transition: 0.3s; text-transform: uppercase;
        }
        .btn-login:hover { background: #00b8cc; transform: translateY(-1px); }
        #loginError { color: #ef4444; font-size: 0.85rem; margin-top: 1.5rem; display: none; padding: 0.5rem; background: rgba(239, 68, 68, 0.1); border-radius: 4px; }
        
        /* Dashboard Wrapper */
        #appContent { display: none; }
    </style>
</head>
<body class="probatum-v2">

    <div id="loginWall">
        <div class="login-card">
            <h2>UNIFED PROBATUM</h2>
            <p>SISTEMA PERICIAL DE ALTA SEGURANÇA v2.0.5</p>
            
            <div class="input-group">
                <label>Utilizador</label>
                <input type="text" id="userIn" autocomplete="off" placeholder="admin">
            </div>
            
            <div class="input-group">
                <label>Palavra-passe</label>
                <input type="password" id="passIn" placeholder="••••••••">
            </div>
            
            <button class="btn-login" id="enterBtn">AUTENTICAR NO NÓ</button>
            <div id="loginError">Acesso negado: Falha na validação de integridade.</div>
        </div>
    </div>

    <div id="appContent">
        <div id="pureDashboardWrapper">
            </div>
    </div>

    <script src="js_auth.js"></script>
    <script src="js_core_app.js"></script>
    <script src="script.js"></script>
    <script src="script_injection.js"></script>
    <script src="unifed_triada_export.js"></script>
    <script src="nexus.js"></script>
    <script src="enrichment.js"></script>

    <script>
        /**
         * LÓGICA DE ORQUESTRAÇÃO DE ACESSO (v2.0.5-HYBRID)
         */
        const enterBtn = document.getElementById('enterBtn');
        const loginWall = document.getElementById('loginWall');
        const appContent = document.getElementById('appContent');
        const loginError = document.getElementById('loginError');

        async function performLogin() {
            const user = document.getElementById('userIn').value;
            const pass = document.getElementById('passIn').value;

            try {
                // Chama o AuthClient (do js_auth.js retificado)
                const response = await window.AuthClient.login(user, pass);
                
                if (response.success) {
                    console.info('[SYSTEM] Autenticação confirmada via ' + response.mode);
                    
                    // Transição visual
                    loginWall.style.opacity = '0';
                    setTimeout(() => {
                        loginWall.style.display = 'none';
                        appContent.style.display = 'block';
                        
                        // Ativação dos módulos forenses
                        if (typeof window._activatePurePanel === 'function') {
                            window._activatePurePanel();
                        } else if (typeof window.loadAnonymizedRealCase === 'function') {
                            window.loadAnonymizedRealCase();
                        }
                    }, 300);
                }
            } catch (err) {
                loginError.style.display = 'block';
                console.error('[SECURITY] Tentativa de acesso não autorizada.');
            }
        }

        // Eventos
        enterBtn.addEventListener('click', performLogin);
        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') performLogin(); });

        // Auto-login (Sessão persistente)
        window.addEventListener('load', async () => {
            if (window.AuthClient && await window.AuthClient.tryAutoLogin()) {
                loginWall.style.display = 'none';
                appContent.style.display = 'block';
                setTimeout(() => { if(window._activatePurePanel) window._activatePurePanel(); }, 500);
            }
        });
    </script>
</body>
</html>
